<!DOCTYPE html>
<html lang="ru">
<head>

<title>Самарканд & Бухара</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0d1117;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#0d1b3e,#122150);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.hdr-b{background:rgba(255,190,50,.12);border:1px solid rgba(255,190,50,.3);color:#ffbe32;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.tabs{display:flex;background:#0d1b3e;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;user-select:none;transition:color .2s,border-color .2s}
.tab.on{color:#ffbe32;border-bottom-color:#ffbe32}
.tab i{display:block;font-size:18px;font-style:normal;margin-bottom:2px}
#wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#map-wrap{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%}
#lv{flex:1;overflow-y:auto;display:none;background:#0d1117}
.lsec{padding:14px 16px 4px}
.ltitle{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.litem{background:#141b2d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.litem:active{background:#1e2745}
.licon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lname{font-size:15px;font-weight:600}
.ltype{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.larr{color:rgba(255,255,255,.2);font-size:20px;margin-left:auto}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:0;right:0;background:#141b2d;border-radius:22px 22px 0 0;z-index:1001;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:88dvh;overflow-y:auto}
.sh.on{transform:translateY(0)}
.sh-hdl{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 0}
.sh-hdr{padding:16px 20px 0}
.sh-em{font-size:52px;text-align:center;display:block;margin-bottom:10px}
.sh-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.sh-name{font-size:22px;font-weight:800;line-height:1.2}
.sh-type{font-size:14px;color:rgba(255,255,255,.45);margin-top:4px}
.sh-body{padding:16px 20px 36px}
.sh-desc{font-size:15px;line-height:1.65;color:rgba(255,255,255,.8)}
.chips{margin-top:14px;display:flex;flex-wrap:wrap;gap:7px}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 12px;font-size:13px;color:rgba(255,255,255,.65)}
.tip{margin-top:14px;background:rgba(255,190,50,.08);border-left:3px solid #ffbe32;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:rgba(255,255,255,.72);line-height:1.55}
.tip b{color:#ffbe32}
.mbtns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:500}
.mbtn{width:42px;height:42px;background:rgba(13,27,62,.92);border:1px solid rgba(255,255,255,.15);border-radius:11px;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.mbtn:active{background:rgba(30,45,100,.9)}
.hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:rgba(255,255,255,.65);font-size:12px;padding:7px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;transition:opacity 1s;z-index:500}
.hint.gone{opacity:0}

/* Markers */
.pin-icon{background:none!important;border:none!important;overflow:visible}
.pin-outer{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,.5)}
.pin-tail{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;margin:0 auto}
.city-icon{background:none!important;border:none!important;overflow:visible}
.city-bubble{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;cursor:pointer;transition:transform .15s}
.city-bubble:active{transform:scale(.93)}
.city-count{font-size:22px;font-weight:800;line-height:1}
.city-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;opacity:.85}

/* Place name labels */
.place-lbl{background:rgba(255,255,255,.92)!important;border:1px solid rgba(0,0,0,.12)!important;color:rgba(0,0,0,.75)!important;font-size:11px!important;font-weight:600!important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif!important;box-shadow:0 1px 4px rgba(0,0,0,.15)!important;padding:3px 8px!important;border-radius:7px!important;white-space:nowrap!important}
.place-lbl::before{display:none!important}

/* Leaflet overrides */
.leaflet-container{background:#e8e0d8!important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.leaflet-control-attribution{background:rgba(255,255,255,.7)!important;color:rgba(0,0,0,.4)!important;font-size:9px!important;padding:2px 6px!important}
.leaflet-control-attribution a{color:rgba(0,0,0,.5)!important}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-t">🕌 Самарканд & Бухара</div><div class="hdr-s">Интерактивный путеводитель</div></div>
  <div class="hdr-b">✈️ 2025</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const P=[
  // ── САМАРКАНД ──────────────────────────────────────────────────────
  {id:'s1',city:'sam',name:'Площадь Регистан',type:'Архитектурный ансамбль XV–XVII вв.',em:'🏛',lat:39.6547,lng:66.9758,col:'#c0392b',
   desc:'Площадь Регистан — сердце Самарканда и один из величайших архитектурных ансамблей исламского мира. Три медресе строились почти три столетия и представляют разные эпохи тимуридского и шейбанидского зодчества. Медресе Улугбека (1420 г.) — старейшее, возведённое учёным-правителем, при котором Самарканд стал центром математики и астрономии; его пропорции выверены с почти математической точностью. Медресе Шердор («несущий львов», 1636 г.) знаменито смелыми тиграми с человеческими лицами на портале — нарушение запрета на изображение живых существ, которое историки объясняют политическими амбициями заказчика. Медресе Тилля-Кари («покрытое золотом», 1660 г.) служило главной мечетью города; его купольный зал изнутри сплошь покрыт позолотой в технике кундал — эффект грандиозный и почти оглушительный. Вместе три медресе образуют пространство, в котором тихо кружится голова.',
   facts:['📅 1420–1660 гг.','⏱ 2–3 часа','💰 Платный вход','🌙 Вечернее шоу'],
   tip:'<b>Совет:</b> Приходи до 9:00 утра — туристов почти нет и свет мягкий. После 20:00 начинается световое шоу на фасадах медресе — проектируются узоры и история Самарканда; это отдельный и незабываемый опыт.'},

  {id:'s2',city:'sam',name:'Некрополь Шахи-Зинда',type:'Мавзолейный комплекс XI–XV вв.',em:'⚱️',lat:39.6680,lng:66.9752,col:'#8e44ad',
   desc:'Шахи-Зинда — «улица мёртвых», вытянувшаяся вдоль узкого прохода: более двадцати мавзолеев XI–XV веков, поставленных вплотную друг к другу. По преданию, здесь похоронен Кусам ибн Аббас — двоюродный брат пророка Мухаммада, который принёс ислам в Самарканд в VII веке. Большинство мавзолеев возведены для сестёр и жён Тамерлана — правитель хотел, чтобы его близкие покоились рядом со святым. Изразцовое убранство — одно из лучших в мире: бирюзовые, кобальтовые и белые плитки покрывают купола, порталы и интерьеры орнаментами такой детальности и сохранности, что кажутся сделанными вчера. Особенно поражает мавзолей Туман-ака с геометрической мозаикой и усыпальница Шади-Мульк-ака с растительными узорами из полутора сотен оттенков.',
   facts:['📅 XI–XV вв.','⏱ 1–2 часа','🧣 Дресс-код','💰 Платный вход'],
   tip:'<b>Совет:</b> Надевай скромную одежду — это действующее святое место, не только туристический объект. Плитка особенно хороша в яркий полдень, когда синева прямо-таки светится.'},

  {id:'s3',city:'sam',name:'Мавзолей Гур-э-Амир',type:'Гробница Тамерлана, 1404 г.',em:'👑',lat:39.6573,lng:66.9694,col:'#27ae60',
   desc:'Гур-э-Амир — «гробница эмира» — был возведён Тамерланом в 1404 году для любимого внука Мухаммад-Султана, но в итоге стал усыпальницей самого Тамерлана, его сыновей и внуков, включая Улугбека. Рубчатый купол диаметром 15 метров в бирюзово-синей плитке с белым орнаментом стал образцом для тимуридской архитектуры по всей Азии — его прямым потомком считается купол Тадж-Махала. Интерьер поражает: нефритовая плита над кенотафом Тамерлана — крупнейший обработанный нефрит своего времени, пол и панели выложены оникс-мрамором, а позолоченный сталактитный свод купола кружит голову. Настоящие захоронения находятся в склепе под главным залом; туда можно спуститься — атмосфера там совсем иная, тихая и тёмная.',
   facts:['📅 1404 г.','⏱ 45–60 мин','💰 Платный вход','⬇️ Есть крипта'],
   tip:'<b>Легенда:</b> Советские учёные вскрыли гробницу в июне 1941 года. На надгробии было выбито предупреждение: «Кто вскроет мою могилу, навлечёт на свою страну захватчика страшнее меня». На следующий день Германия напала на СССР.'},

  {id:'s4',city:'sam',name:'Мечеть Биби-Ханым',type:'Соборная мечеть Тамерлана, 1404 г.',em:'🕌',lat:39.6610,lng:66.9745,col:'#2980b9',
   desc:'Биби-Ханым — самое амбициозное строительство Тамерлана. Вернувшись из индийского похода с несметными богатствами и пятью тысячами пленных мастеров, он приказал возвести мечеть, которая превзойдёт всё существующее. Стройка шла четыре года в бешеном темпе: главный портал высотой 35 метров виден был за несколько километров, центральный купол достигал 41 метра. Мастера допустили конструктивные просчёты, торопясь угодить правителю: своды начали трескаться ещё при жизни Тамерлана, а землетрясения XV–XIX веков превратили мечеть в живописные руины. Масштабная советская реставрация восстановила основной облик — но от первоначального декора сохранились лишь фрагменты. Сейчас мечеть производит двойственное впечатление: грандиозный замысел читается в пропорциях, но подлинности в камне осталось немного.',
   facts:['📅 1399–1404 гг.','⏱ 45 мин','💰 Платный вход','📐 Купол 41 м'],
   tip:'<b>Рядом:</b> Через дорогу — базар Сиаб. Попробуй самаркандскую лепёшку прямо из тандыра; говорят, такая она только здесь.'},

  {id:'s5',city:'sam',name:'Базар Сиаб',type:'Главный продовольственный рынок',em:'🧆',lat:39.6616,lng:66.9770,col:'#e67e22',
   desc:'Базар Сиаб у восточных ворот Биби-Ханым — настоящий живой рынок, где самаркандцы закупаются каждый день, а не туристическая витрина. Прилавки ломятся от сухофруктов: инжир, курага, чёрный изюм, вяленая дыня, финики — в горах высотой по колено. Ряды специй с зирой, куркумой, барбарисом и красным перцем переливаются всеми оттенками жёлтого и оранжевого. Главная реликвия рынка — самаркандский нон: широкие лепёшки, которые пекут в тандырных печах прямо на месте, украшают особым штампом и везут домой по всему Узбекистану как главный сувенир. Здесь же можно купить сумалак, халву, козинаки и местные сладости — попробуй парвардý, воздушную карамель в сахарной пудре.',
   facts:['⏰ С 7:00 до 14:00','💵 Торг уместен','🍞 Нон из тандыра','🌶 Специи и орехи'],
   tip:'<b>Попробуй:</b> Самаркандский нон, халву на льняном масле, вяленую дыню и грецкие орехи. Лепёшку лучше брать горячей — через час она уже не та.'},

  {id:'s6',city:'sam',name:'Мавзолей Ходжа Дониёр',type:'Святилище пророка Даниила',em:'✨',lat:39.6733,lng:66.9892,col:'#16a085',
   desc:'На берегу реки Сиаб стоит мавзолей библейского пророка Даниила (Аюб в исламской традиции). По преданию, Тамерлан привёз его останки из персидского Суза в 1392 году — правитель верил, что мощи праведника принесут городу благословение. Усыпальница обладает необъяснимым свойством: она медленно «растёт» — несколько сантиметров в год — и сегодня тянется на 18 метров в длину. Учёные связывают это с набуханием грунта от подземных вод, верующие — с нетленностью пророка. Рядом бьёт родник, вода которого считается целебной. Мавзолей почитается мусульманами, иудеями и христианами одновременно — один из редчайших примеров межрелигиозного святого места в мире.',
   facts:['🧭 Берег реки Сиаб','⏱ 30 мин','🆓 Вход свободный','📏 Длина 18 м'],
   tip:'<b>Интересно:</b> У входа продают воду из родника в бутылках. Местные набирают её домой.'},

  {id:'s7',city:'sam',name:'Мечеть Хазрат-Хизр',type:'Мечеть с видовой террасой',em:'🌅',lat:39.6693,lng:66.9757,col:'#1abc9c',
   desc:'Мечеть Хазрат-Хизр стоит на холме над некрополем Шахи-Зинда — одно из древнейших мест богослужения в Самарканде, основанное, по преданию, ещё в IX веке на месте явления пророка Хизра. Нынешнее здание в белых и голубых тонах построено в XIX веке эмиром Бухары Насруллой-ханом и отреставрировано в 2000-х. Сама по себе мечеть небольшая и скромная, но её открытая терраса даёт лучший в городе вид: весь некрополь Шахи-Зинда лежит прямо у ног, за ним купола Биби-Ханым, а вдали угадываются минареты Регистана. Это идеальная точка для фотографии в «золотой час», когда бирюзовые купола мавзолеев светятся в тёплом вечернем свете.',
   facts:['🕌 Действующая мечеть','⏱ 20–30 мин','🧣 Скромная одежда','📸 Лучший вид на Шахи-Зинда'],
   tip:'<b>Совет:</b> Зайди сюда перед посещением Шахи-Зинды или сразу после — вход со стороны некрополя. Лучший свет за 1–1.5 часа до заката.'},

  {id:'s8',city:'sam',name:'Музей и руины Афросиаба',type:'Древнее городище, IV в. до н.э.',em:'🏺',lat:39.6730,lng:66.9870,col:'#d35400',
   desc:'Афросиаб — многослойное городище площадью около 220 гектаров, предшественник нынешнего Самарканда. Здесь стояла Мараканда — столица Согдийского царства, захваченная Александром Македонским в 329 году до нашей эры; сам завоеватель провёл здесь несколько месяцев и именно здесь в пьяной ссоре убил своего друга Клита. Культурные слои уходят на 8 метров в глубину — в них закодированы 2500 лет истории города вплоть до монгольского разрушения 1220 года. В небольшом музее на территории хранится главная находка раскопок: уникальные фрески VII века нашей эры — процессия послов к согдийскому царю изображена с поразительной детальностью; по одеждам, оружию и подаркам историки восстанавливают торговые и дипломатические связи доисламской Центральной Азии.',
   facts:['📅 IV в. до н.э. – XIII в.','🏛 Музей фресок','⏱ 1–1.5 часа','🌿 Большая территория'],
   tip:'<b>Совет:</b> Музей небольшой, но фрески уникальны — не пропусти. На самом городище можно гулять по тропинкам среди раскопов и смотреть на Самарканд с высоты холма.'},

  {id:'s9',city:'sam',name:'Мавзолей Ишрат-хана',type:'Погребальный дворец тимуридских принцесс',em:'🔷',lat:39.6568,lng:66.9832,col:'#2471a3',
   desc:'«Дворец радости» — неожиданное название для гробницы. Мавзолей 1464 года построен для принцесс тимуридского дома и своей архитектурой скорее напоминает дворец, чем усыпальницу: широкие пропорции, боковые галереи, сложный план с несколькими погребальными камерами. Купол украшен геометрическим орнаментом из бирюзовых и белых изразцов, а во внутренних покоях сохранились фрагменты оригинальной росписи XV века — редкость, учитывая возраст. Мавзолей находится в стороне от главных туристических маршрутов, в глубине жилых кварталов, и поэтому здесь почти никогда не бывает туристов. Редкая возможность осмотреть средневековую тимуридскую архитектуру в полной тишине.',
   facts:['📅 1464 г.','⏱ 30–40 мин','👁 Мало туристов','🏛 Тимуридская архитектура'],
   tip:'<b>Как найти:</b> Мавзолей спрятан в переулках — ищи по навигатору: «Ишрат-хона». Если ворота закрыты, постучи — смотритель обычно открывает.'},

  {id:'b0',city:'bux',name:'Отель Shakh',type:'Начало маршрута по Бухаре',em:'🏨',lat:39.7742,lng:64.4162,col:'#ffbe32',
   desc:'Бутик-отель Shakh расположен в самом сердце старого города — в нескольких минутах ходьбы от Пой-Каляна, крепости Арк, торговых куполов и Ляби-Хауза. Отсюда начинается наш маршрут по Бухаре — одному из лучших по сохранности средневековых городов Центральной Азии, включённому в список ЮНЕСКО. Большинство главных достопримечательностей находятся в пешей доступности, и лучший способ исследовать Бухару — идти пешком, не торопясь, заглядывая в случайные переулки. Старый город живёт неторопливо: ремесленники работают в тех же мастерских, что и триста лет назад, а утром можно застать квартальных аксакалов за неспешным чаем.',

  {id:'b1',city:'bux',name:'Арк — крепость-цитадель',type:'Древняя цитадель, I–XX вв.',em:'🏰',lat:39.7760,lng:64.4155,col:'#c0392b',
   desc:'Арк — сердце Бухары на протяжении 2500 лет. Эта гигантская цитадель с 20-метровыми стенами была городом внутри города: здесь располагались дворец эмира, мечеть, казна, монетный двор, оружейные склады, гарем и зиндан — знаменитая подземная тюрьма с ямами, где держали заключённых вместе с клопами и насекомыми. Последние бухарские эмиры жили здесь вплоть до 1920 года, когда Красная армия взяла Бухару штурмом и бомбардировкой с воздуха. Треть цитадели была уничтожена в ходе боёв; уцелевшая часть стала музеем. Во внутреннем дворе можно осмотреть тронный зал, покои эмира и тюремные ямы — разрыв между роскошью и жестокостью впечатляет.',
   facts:['📅 I–XX вв.','⏱ 1.5–2 часа','💰 Платный вход','🏛 Музей внутри'],
   tip:'<b>Зиндан:</b> Не пропусти подземную тюрьму в углу цитадели. В 1842 году здесь казнили британских офицеров-разведчиков Стоддарта и Конноли — они неделями сидели в яме с насекомыми перед смертью.'},

  {id:'b2',city:'bux',name:'Минарет Калян',type:'Минарет XII века',em:'🗼',lat:39.7740,lng:64.4175,col:'#8e44ad',
   desc:'Минарет Калян («великий», 1127 г.) — 47-метровая башня из кирпича, покрытая 14 поясами геометрического орнамента, каждый из которых уникален. Построил его правитель Арслан-хан, и уже в Средние века минарет был настолько знаменит, что Чингисхан, разрушив Бухару в 1220 году, приказал пощадить башню — по легенде, он снял шлем, склонив голову, чтобы лучше разглядеть верхушку, и это стало жестом уважения. В Средние века с вершины минарета трижды в день провозглашали азан, а преступников сбрасывали с него как вид казни — «башня смерти». Сейчас на вершину туристов не пускают, но ансамбль Пой-Калян — минарет, мечеть Калян и медресе Мир-Ароб напротив — один из самых красивых архитектурных видов Средней Азии.',
   facts:['📅 1127 г.','📐 Высота 47 м','⏱ 30–40 мин','🛡 Пощажён Чингисханом'],
   tip:'<b>Вечером</b> минарет и ансамбль Пой-Калян красиво подсвечены. Лучший вид — с чайханы у Ляби-Хауза или с верхней лоджии медресе (если откроют).'},

  {id:'b3',city:'bux',name:'Медресе Мир-Ароб',type:'Действующее исламское медресе, 1536 г.',em:'📖',lat:39.7740,lng:64.4173,col:'#5d6d7e',
   desc:'Медресе Мир-Ароб — одно из двух исламских учебных заведений Средней Азии, которые работали без перерыва даже в советское время (второй — Кокандское медресе). Построенное в 1535–1536 годах при правителе Убайдулла-хане, который сам был учёным-богословом, медресе давало образование до 500 студентам одновременно. В советские десятилетия оно функционировало под строгим контролем властей как единственный «официальный» центр ислама в СССР — своеобразный витринный объект. Сегодня студенты по-прежнему учатся здесь исламскому праву, теологии и арабскому языку. Фасад медресе выходит прямо на площадь Пой-Калян, образуя с минаретом и мечетью Калян один из самых фотогеничных ансамблей в Бухаре. Внутрь туристов не пускают — только по особому разрешению.',
   facts:['📅 1535–1536 гг.','🎓 Действующее медресе','⏱ 15–20 мин','🚫 Вход для студентов'],
   tip:'<b>Лучший ракурс:</b> Встань посередине площади Пой-Калян — в один кадр входят минарет, мечеть Калян и медресе. Золотой час — рассвет или час после заката.'},

  {id:'b4',city:'bux',name:'Ляби-Хауз',type:'Площадь с прудом XVII в.',em:'💧',lat:39.7720,lng:64.4197,col:'#2980b9',
   desc:'Ляби-Хауз — «над прудом» — центральная площадь Бухары и главное место встреч горожан. Прямоугольный бассейн 1620 года окружён вековыми тутовыми деревьями и тремя архитектурными памятниками: медресе Кукельдаш, медресе Надир Диван-беги и ханакой того же заказчика. Когда-то в Бухаре было более 100 хаузов — водоёмов, снабжавших город водой; Ляби-Хауз — единственный сохранившийся. По вечерам вокруг пруда раскрываются рестораны с топчанами над водой, местные играют в нарды и шахматы, продавцы разворачивают лавки — это не туристическое шоу, а настоящая живая Бухара. Бронзовый Ходжа Насреддин на осле у пруда — любимое место для фотографий.',

   tip:'<b>Вечер</b> здесь особенно хорош: огни отражаются в воде, играет музыка, работают торговцы. Приходи не раньше 19:00.'},

  {id:'b5',city:'bux',name:'Ханака Надир Диван-беги',type:'Суфийский монастырь XVII в.',em:'🕊',lat:39.7723,lng:64.4200,col:'#117a65',
   desc:'Суфийский монастырь-ханака 1620 года, возведённый визирем Надиром Диван-беги на берегу Ляби-Хауза. Фасад украшен парой фантастических птиц — феникс или симург — с распростёртыми крыльями и поднятыми к солнцу головами; у их ног — олени. Это необычный образ для исламской архитектуры, где изображение живых существ строго ограничено: по легенде, визирь не знал, что задумал мастер, а когда увидел, уже ничего нельзя было изменить. Ханака была местом собраний суфийских братств — дервишей, для которых музыка, пение и танец были путём к Богу. Вместе с медресе того же заказчика и прудом здание образует ансамбль Ляби-Хауз — исторический центр бухарской общественной жизни.',
   facts:['📅 1620 г.','🎨 Птицы симург на фасаде','⏱ 20–30 мин','🎵 Летние концерты'],
   tip:'<b>Посмотри на фасад внимательно:</b> птицы с человеческими лицами над входом — и солнечный диск между ними. Это один из самых смелых образов в архитектуре всего региона.'},

  {id:'b6',city:'bux',name:'Чор-Минор',type:'Ворота медресе с четырьмя минаретами',em:'🕍',lat:39.7758,lng:64.4259,col:'#27ae60',
   desc:'Чор-Минор — «четыре минарета» — ворота небольшого медресе 1807 года, построенного состоятельным туркменским купцом Халифом Ниязкулом. Четыре стройных минарета с голубыми куполами разной высоты и разными орнаментами — по одной версии, они символизируют четыре главные религиозные книги, по другой — просто прихоть заказчика. Само медресе до наших дней почти не сохранилось; уцелели только ворота — но именно они сделали Чор-Минор одним из самых узнаваемых и фотографируемых видов Бухары. Здание расположено в глубине жилых кварталов старого города, и путь к нему — это маленькое приключение: нужно петлять по узким переулкам, где жизнь почти не изменилась за сто лет.',
   facts:['📅 1807 г.','⏱ 20–30 мин','📸 Культовый вид Бухары','🟦 4 голубых купола'],
   tip:'<b>Как найти:</b> По навигатору ищи «Chor Minor» или «Чор-Минор». Внутрь можно подняться по лестнице за небольшую плату — вид с галереи неплохой.'},

  {id:'b7',city:'bux',name:'Мавзолей Саманидов',type:'Мавзолей X века',em:'⬛',lat:39.7778,lng:64.4142,col:'#f39c12',
   desc:'Мавзолей Саманидов (~905 г.) — жемчужина раннесредневековой исламской архитектуры и один из старейших сохранившихся исламских мавзолеев в мире. Построен для основателя Саманидской династии Исмаила Самани — правителя, при котором Бухара стала столицей великой империи и центром персидской культуры. Уникальность здания в кирпичной кладке: одинаковые жжёные кирпичи уложены в узор, который играет со светом — рельефный орнамент меняет свой рисунок в зависимости от угла падения солнца: утром, в полдень и на закате здание выглядит по-разному. Мавзолей пережил монгольское нашествие, засыпанный речным песком, — и именно это спасло его. Раскопан в XIX–XX веке.',
   facts:['📅 ~905 г.','⏱ 30–40 мин','🌍 ЮНЕСКО','🧱 Игра света и тени'],
   tip:'<b>Оптика:</b> Зайди в разное время суток — кладка выглядит принципиально по-разному. Лучший момент — косой утренний или вечерний свет, когда рельеф кирпичей отбрасывает чёткие тени.'},

  {id:'b8',city:'bux',name:'Мечеть Боло-Хауз',type:'Деревянная мечеть, 1712 г.',em:'🌿',lat:39.7766,lng:64.4145,col:'#16a085',
   desc:'Боло-Хауз — «мечеть над прудом» — изящнейшая постройка Бухары начала XVIII века. Главная её ценность — деревянный айван: открытый портик на 20 стройных резных колоннах из тутового дерева с пышными сталактитовыми капителями. Каждая колонна уникальна — резьба не повторяется нигде. Этот айван отражается в небольшом пруду перед мечетью: в безветренный день отражение столь чёткое, что кажется, будто смотришь на две мечети сразу. Постройка функционировала как пятничная мечеть эмира — правитель приходил сюда молиться из соседней крепости Арк. Боло-Хауз часто упускают туристы, спеша к Арку и Пой-Каляну — и совершенно напрасно.',

  {id:'b9',city:'bux',name:'Торговые купола',type:'Крытые базары XVI в.',em:'🛒',lat:39.7735,lng:64.4180,col:'#e67e22',

  {id:'b10',city:'bux',name:'Мавзолей Чашма Аюб',type:'Мавзолей пророка Иова, XI–XIV вв.',em:'💦',lat:39.7780,lng:64.4135,col:'#1a5276',
   desc:'«Источник Иова» — мавзолей над родником, который, по преданию, забил из-под земли, когда пророк Аюб (библейский Иов) в своих скитаниях ударил посохом о бухарскую землю. Родник цел по сей день, вода в нём прозрачная и холодная даже в летний зной — её считают целебной, и местные набирают домой. Здание сочетает несколько построек XI–XIV веков, разных по стилю: один купол выполнен в характерной хорезмийской конической форме, почти не встречающейся в Бухаре, — предположительно, он возведён по приказу завоевателя Тимура. Внутри работает небольшой, но занимательный музей истории бухарского водоснабжения — системы каналов, кяризов и хаузов, которые кормили город водой в условиях пустыни.',

   desc:'«Дворец, подобный звёздам и луне» — летняя резиденция последних бухарских эмиров в 4 км к северу от цитадели Арк. Построенный на рубеже XIX–XX веков, дворец стал воплощением эклектики: изразцовые айваны и узорчатые потолки в среднеазиатском духе соседствуют с европейской мебелью, венецианскими зеркалами, русской кафельной печью и французскими люстрами. Эмир Алим-хан принимал здесь иностранных гостей, в том числе российских чиновников и дипломатов, и хотел продемонстрировать Бухару европейской державой. Во дворе — бассейн, фонтаны, розарий. В 1920 году дворец перешёл к советским властям; сегодня внутри музей прикладного искусства: шёлковые халаты, серебряные украшения, резьба по ганчу — всё лучшее, что создавали бухарские мастера.',

const VIEWS={all:{center:[39.716,65.72],zoom:8},sam:{center:[39.663,66.945],zoom:14},bux:{center:[39.7745,64.421],zoom:15}};

// Init Leaflet
const map=L.map('map',{center:[39.716,65.72],zoom:8,zoomControl:false,attributionControl:true,tap:false});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

// Routes (two separate, no inter-city line)
const routeStyle={color:'#e8a020',weight:2.5,dashArray:'10,10',opacity:.7};
L.polyline(ROUTE_SAM,routeStyle).addTo(map);
L.polyline(ROUTE_BUX,routeStyle).addTo(map);

// City overview bubbles (zoom < 11)
const cityLayer=L.layerGroup();
const samCount=P.filter(p=>p.city==='sam').length;
const buxCount=P.filter(p=>p.city==='bux').length;
[{label:'Самарканд',lat:39.663,lng:66.945,col:'#e06060',count:samCount,key:'sam'},
 {label:'Бухара',lat:39.7745,lng:64.421,col:'#7070dd',count:buxCount,key:'bux'}
].forEach(c=>{
  const icon=L.divIcon({
    html:`<div class="city-bubble" style="background:${c.col}20;border-color:${c.col};box-shadow:0 0 24px ${c.col}44;color:${c.col}"><span class="city-count">${c.count}</span><span class="city-label">${c.label}</span></div>`,
    className:'city-icon',
    iconSize:[64,64],
    iconAnchor:[32,32]
  });
  L.marker([c.lat,c.lng],{icon}).on('click',()=>flyTo(c.key)).addTo(cityLayer);
});

// Individual place markers (zoom >= 11)
const placeLayer=L.layerGroup();
P.forEach(p=>{
  const fill=p.col+'cc',shadow=p.col+'55';
  const icon=L.divIcon({
    html:`<div class="pin-outer" style="background:${fill};box-shadow:0 0 12px ${shadow}"><span>${p.em}</span></div><div class="pin-tail" style="border-top:8px solid ${fill}"></div>`,
    className:'pin-icon',
    iconSize:[40,48],
    iconAnchor:[20,48],
    tooltipAnchor:[0,4]
  });
  const m=L.marker([p.lat,p.lng],{icon}).addTo(placeLayer);
  m.bindTooltip(p.name,{permanent:true,direction:'bottom',offset:[0,0],className:'place-lbl'});
  m.on('click',()=>openSheet(p));
});

function updateLayers(){
  const z=map.getZoom();
  if(z>=11){cityLayer.remove();placeLayer.addTo(map);}
  else{placeLayer.remove();cityLayer.addTo(map);}
}
map.on('zoomend',updateLayers);
cityLayer.addTo(map);

function flyTo(key){
  const v=VIEWS[key];
  map.flyTo(v.center,v.zoom,{duration:.8,easeLinearity:.5});
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('t-'+tab).classList.add('on');
  const isMap=tab==='map';
  document.getElementById('map-wrap').style.display=isMap?'':'none';
  document.getElementById('lv').style.display=isMap?'none':'block';
  if(isMap){setTimeout(()=>map.invalidateSize(),50);}
  else{renderList(tab);flyTo(tab);}
}

function renderList(tab){
  const items=P.filter(p=>p.city===tab);
  const city=tab==='sam'?'Самарканд':'Бухара';
  let h=`<div class="lsec"><div class="ltitle">${city} · ${items.length} мест</div>`;
  items.forEach(p=>{
    h+=`<div class="litem" onclick='openSheet(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="licon" style="background:${p.col}22">${p.em}</div>
      <div style="flex:1;min-width:0"><div class="lname">${p.name}</div><div class="ltype">${p.type}</div></div>
      <div class="larr">›</div></div>`;
  });
  document.getElementById('lv').innerHTML=h+'</div>';
}

function openSheet(p){
  const badge=`<span class="sh-badge" style="background:${p.col}22;color:${p.col};border:1px solid ${p.col}55">${p.city==='sam'?'Самарканд':'Бухара'}</span>`;
  const chips=p.facts.map(f=>`<div class="chip">${f}</div>`).join('');
  document.getElementById('shc').innerHTML=`
    <div class="sh-hdr"><span class="sh-em">${p.em}</span>${badge}
      <div class="sh-name">${p.name}</div><div class="sh-type">${p.type}</div></div>
    <div class="sh-body"><div class="sh-desc">${p.desc}</div>
      <div class="chips">${chips}</div>${p.tip?`<div class="tip">${p.tip}</div>`:''}</div>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh').classList.add('on');
}

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
}

let shY=0;
const shEl=document.getElementById('sh');
shEl.addEventListener('touchstart',e=>{shY=e.touches[0].clientY;},{passive:true});
shEl.addEventListener('touchmove',e=>{if(e.touches[0].clientY-shY>60)closeSheet();},{passive:true});

setTimeout(()=>{const h=document.getElementById('hint');h.classList.add('gone');setTimeout(()=>h.style.display='none',1000);},4000);
</script>
</body>
</html>
