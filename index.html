<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Самарканд & Бухара</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:#0d1117;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;flex-direction:column}
.hdr{background:linear-gradient(135deg,#0d1b3e,#122150);padding:12px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.hdr-b{background:rgba(255,190,50,.12);border:1px solid rgba(255,190,50,.3);color:#ffbe32;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.tabs{display:flex;background:#0d1b3e;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.tab{flex:1;padding:9px 6px;text-align:center;font-size:12px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;user-select:none;transition:color .2s,border-color .2s}
.tab.on{color:#ffbe32;border-bottom-color:#ffbe32}
.tab i{display:block;font-size:18px;font-style:normal;margin-bottom:2px}
#wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#map-wrap{position:relative;flex:1;overflow:hidden}
#map{width:100%;height:100%}
#lv{flex:1;overflow-y:auto;display:none;background:#0d1117}
.lsec{padding:14px 16px 4px}
.ltitle{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:10px}
.litem{background:#141b2d;border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px}
.litem:active{background:#1e2745}
.licon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.lname{font-size:15px;font-weight:600}
.ltype{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.larr{color:rgba(255,255,255,.2);font-size:20px;margin-left:auto}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;bottom:0;left:0;right:0;background:#141b2d;border-radius:22px 22px 0 0;z-index:1001;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:88dvh;overflow-y:auto}
.sh.on{transform:translateY(0)}
.sh-hdl{width:36px;height:4px;background:rgba(255,255,255,.18);border-radius:2px;margin:12px auto 0}
.sh-hdr{padding:16px 20px 0}
.sh-em{font-size:52px;text-align:center;display:block;margin-bottom:10px}
.sh-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.sh-name{font-size:22px;font-weight:800;line-height:1.2}
.sh-type{font-size:14px;color:rgba(255,255,255,.45);margin-top:4px}
.sh-body{padding:16px 20px 36px}
.sh-desc{font-size:15px;line-height:1.65;color:rgba(255,255,255,.8)}
.chips{margin-top:14px;display:flex;flex-wrap:wrap;gap:7px}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 12px;font-size:13px;color:rgba(255,255,255,.65)}
.tip{margin-top:14px;background:rgba(255,190,50,.08);border-left:3px solid #ffbe32;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:rgba(255,255,255,.72);line-height:1.55}
.tip b{color:#ffbe32}
.mbtns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:500}
.mbtn{width:42px;height:42px;background:rgba(13,27,62,.92);border:1px solid rgba(255,255,255,.15);border-radius:11px;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.mbtn:active{background:rgba(30,45,100,.9)}
.hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:rgba(255,255,255,.65);font-size:12px;padding:7px 16px;border-radius:20px;pointer-events:none;white-space:nowrap;transition:opacity 1s;z-index:500}
.hint.gone{opacity:0}

/* Markers */
.pin-icon{background:none!important;border:none!important;overflow:visible}
.pin-outer{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid rgba(255,255,255,.45);position:relative}
.pin-tail{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;margin:0 auto}
.city-icon{background:none!important;border:none!important;overflow:visible}
.city-bubble{width:64px;height:64px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;cursor:pointer;transition:transform .15s}
.city-bubble:active{transform:scale(.93)}
.city-count{font-size:22px;font-weight:800;line-height:1}
.city-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:1px;opacity:.8}

/* Leaflet tooltip for place labels */
.place-lbl{background:rgba(5,10,28,.8)!important;border:1px solid rgba(255,255,255,.12)!important;color:rgba(255,255,255,.85)!important;font-size:11px!important;font-weight:600!important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif!important;box-shadow:none!important;padding:3px 8px!important;border-radius:7px!important;white-space:nowrap!important}
.place-lbl::before{display:none!important}

/* Leaflet overrides */
.leaflet-container{background:#0d1a2e!important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.leaflet-control-attribution{background:rgba(0,0,0,.6)!important;color:rgba(255,255,255,.35)!important;font-size:9px!important;padding:2px 6px!important}
.leaflet-control-attribution a{color:rgba(255,255,255,.5)!important}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-t">🕌 Самарканд & Бухара</div><div class="hdr-s">Интерактивный путеводитель</div></div>
  <div class="hdr-b">✈️ 2025</div>
</div>
<div class="tabs">
  <div class="tab on" id="t-map" onclick="showTab('map')"><i>🗺</i>Карта</div>
  <div class="tab" id="t-sam" onclick="showTab('sam')"><i>🏛</i>Самарканд</div>
  <div class="tab" id="t-bux" onclick="showTab('bux')"><i>🕌</i>Бухара</div>
</div>
<div id="wrap">
  <div id="map-wrap">
    <div id="map"></div>
    <div class="mbtns" id="mbtns">
      <div class="mbtn" onclick="flyTo('sam')" title="Самарканд">🏛</div>
      <div class="mbtn" onclick="flyTo('bux')" title="Бухара">🕌</div>
      <div class="mbtn" onclick="flyTo('all')" title="Обзор">🌍</div>
    </div>
    <div class="hint" id="hint">Нажми на пин · Двумя пальцами для зума</div>
  </div>
  <div id="lv"></div>
</div>
<div class="ov" id="ov" onclick="closeSheet()"></div>
<div class="sh" id="sh"><div class="sh-hdl"></div><div id="shc"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const P=[
  {id:'s1',city:'sam',name:'Площадь Регистан',type:'Архитектурный ансамбль',em:'🏛',lat:39.6547,lng:66.9758,col:'#c0392b',
   desc:'Сердце Самарканда и жемчужина Средней Азии. Три медресе — Улугбека (XV в.), Шердор и Тилля-Кари (XVII в.) — образуют один из грандиознейших архитектурных ансамблей исламского мира.',
   facts:['📅 XIV–XVII вв.','⏱ 2–3 часа','💰 Платный вход','📷 Фото разрешено'],
   tip:'<b>Совет:</b> Приходи до 9:00 — меньше туристов и мягкий утренний свет. Вечером включается красивая подсветка.'},
  {id:'s2',city:'sam',name:'Некрополь Шахи-Зинда',type:'Мавзолейный комплекс',em:'⚱️',lat:39.6680,lng:66.9752,col:'#8e44ad',
   desc:'«Улица мёртвых» — вереница мавзолеев XI–XV веков с потрясающей бирюзовой плиткой. Здесь похоронены родственники Тамерлана. Название означает «живой царь».',
   facts:['📅 XI–XV вв.','⏱ 1–2 часа','🧣 Дресс-код','💰 Платный вход'],
   tip:'<b>Совет:</b> Надевай скромную одежду — действующее святое место. Плитка особенно красива в яркий полдень.'},
  {id:'s3',city:'sam',name:'Мавзолей Гур-э-Амир',type:'Гробница Тамерлана',em:'👑',lat:39.6573,lng:66.9694,col:'#27ae60',
   desc:'Гробница Тамерлана, его сыновей и внуков (в том числе Улугбека). Построен в 1404 году. Рубчатый купол в бирюзовых изразцах — символ Средней Азии.',
   facts:['📅 1404 г.','⏱ 45–60 мин','💰 Платный вход','📐 Купол 12 м'],
   tip:'<b>Легенда:</b> Советские учёные вскрыли гробницу в 1941 году, прочли проклятие — на следующий день началась операция «Барбаросса».'},
  {id:'s4',city:'sam',name:'Мечеть Биби-Ханым',type:'Соборная мечеть Тамерлана',em:'🕌',lat:39.6610,lng:66.9745,col:'#2980b9',
   desc:'Огромная мечеть 1404 года в честь любимой жены Тамерлана. Высота главного купола — 41 метр. Пострадала от землетрясений, восстановлена в XX веке.',
   facts:['📅 1399–1404 гг.','⏱ 45 мин','💰 Платный вход','📐 Купол 41 м'],
   tip:'<b>Рядом:</b> Через дорогу — базар Сиаб. Попробуй самаркандскую лепёшку прямо из тандыра.'},
  {id:'s5',city:'sam',name:'Обсерватория Улугбека',type:'Средневековая обсерватория',em:'🔭',lat:39.6746,lng:66.8946,col:'#f39c12',
   desc:'Построена в 1428–29 гг. внуком Тамерлана. Здесь создан звёздный каталог из 1018 звёзд. Сохранился гигантский квадрант диаметром 40 метров.',
   facts:['📅 1428–1429 гг.','⏱ 1 час','🌍 ЮНЕСКО','🔭 Квадрант 40 м'],
   tip:'<b>Совет:</b> Рядом есть небольшой музей с реконструкцией обсерватории и арабскими рукописями.'},
  {id:'s6',city:'sam',name:'Базар Сиаб',type:'Колоритный восточный рынок',em:'🧆',lat:39.6616,lng:66.9770,col:'#e67e22',
   desc:'Главный базар Самарканда у стен Биби-Ханым. Специи, сухофрукты, самаркандский хлеб, национальные сладости. Работает с раннего утра.',
   facts:['⏰ С 7:00','💵 Торг уместен','🍞 Хлеб из тандыра','🌶 Специи & орехи'],
   tip:'<b>Попробуй:</b> Самаркандский нон, халву, курагу и грецкие орехи. Цены лучше уточнять заранее.'},
  {id:'s7',city:'sam',name:'Мавзолей Ходжа Дониёр',type:'Святое место',em:'✨',lat:39.6733,lng:66.9892,col:'#16a085',
   desc:'Мавзолей библейского пророка Даниила. По легенде, Тамерлан привёз его останки из Сузы. Усыпальница необычно «растёт» — каждый год прибавляет несколько сантиметров.',
   facts:['🧭 На берегу Сиаба','⏱ 30 мин','🆓 Вход свободный','📏 Длина 18 м'],
   tip:'<b>Интересно:</b> Святое место трёх авраамических религий — приходят мусульмане, христиане и иудеи.'},
  {id:'b1',city:'bux',name:'Арк — крепость-цитадель',type:'Древняя крепость',em:'🏰',lat:39.7760,lng:64.4155,col:'#c0392b',
   desc:'Гигантская цитадель в центре Бухары — сердце города на протяжении 2500 лет. Здесь жили бухарские эмиры вплоть до 1920 года. Стены высотой 20 метров.',
   facts:['📅 I–XX вв.','⏱ 1.5–2 часа','💰 Платный вход','📐 Стены 20 м'],
   tip:'<b>История:</b> В 1842 году здесь казнили британского разведчика Артура Конноли. Рядом — зиндан с пауками.'},
  {id:'b2',city:'bux',name:'Минарет Калян',type:'Минарет XII века',em:'🗼',lat:39.7740,lng:64.4175,col:'#8e44ad',
   desc:'Минарет высотой 47 метров (1127 г.). Один из немногих монументов, которые Чингисхан приказал не разрушать. В средние века служил маяком для торговых каравинов.',
   facts:['📅 1127 г.','⏱ 30 мин','📐 Высота 47 м','🛡 Пощажён Чингисханом'],
   tip:'<b>Вечером</b> красивая подсветка. Мечеть Калян и медресе Мир-Араб рядом — ансамбль Пой-Калян.'},
  {id:'b3',city:'bux',name:'Ляби-Хауз',type:'Площадь с прудом XVII в.',em:'💧',lat:39.7720,lng:64.4197,col:'#2980b9',
   desc:'Центральная площадь с прудом 1620 года. Название — «над прудом». Сейчас главное место отдыха Бухары. Рядом бронзовый Ходжа Насреддин на осле.',
   facts:['📅 1620 г.','⏱ 1 час','🍽 Рестораны рядом','🌳 Старые чинары'],
   tip:'<b>Вечер</b> здесь особенно хорош — огни в воде, местные играют нарды, работают торговцы.'},
  {id:'b4',city:'bux',name:'Чор-Минор',type:'Ворота с четырьмя минаретами',em:'🕍',lat:39.7758,lng:64.4259,col:'#27ae60',
   desc:'Ворота медресе с четырьмя минаретами (1807 г.) — один из самых фотографируемых объектов Бухары. Построен богатым туркменским торговцем.',
   facts:['📅 1807 г.','⏱ 20–30 мин','📸 Культовое фото','🟦 4 голубых купола'],
   tip:'<b>Как найти:</b> Спрячется в переулках старого города. Ищи по навигатору или спроси «Чор-Минор?»'},
  {id:'b5',city:'bux',name:'Мавзолей Саманидов',type:'Мавзолей X века',em:'⬛',lat:39.7778,lng:64.4142,col:'#f39c12',
   desc:'Жемчужина раннесредневековой архитектуры (~905 г.). Один из старейших исламских мавзолеев. Пережил монгольское нашествие — был засыпан песком.',
   facts:['📅 ~905 г.','⏱ 30 мин','🌍 ЮНЕСКО','🧱 Уникальная кладка'],
   tip:'<b>Оптика:</b> Кладка выглядит по-разному утром, днём и вечером — зайди в разное время суток.'},
  {id:'b6',city:'bux',name:'Мечеть Боло-Хауз',type:'Деревянная мечеть XVIII в.',em:'🌿',lat:39.7766,lng:64.4145,col:'#16a085',
   desc:'Изящная мечеть 1712 года с уникальным деревянным айваном на 20 резных колоннах. Одна из красивейших деревянных построек Средней Азии.',
   facts:['📅 1712 г.','⏱ 20–30 мин','🪵 20 колонн','💧 Пруд у входа'],
   tip:'<b>Фото:</b> Отражение 20 деревянных колонн в пруду — одна из красивейших точек Бухары.'},
  {id:'b7',city:'bux',name:'Торговые купола',type:'Крытые базары XVI в.',em:'🛒',lat:39.7735,lng:64.4180,col:'#e67e22',
   desc:'Три крытых торговых купола XVI века: ювелиры, менялы, шапочники. Работают до сих пор — сувениры, ткани, украшения.',
   facts:['📅 XVI в.','⏱ 1 час','🛍 Сувениры','🧵 Шёлк & ювелирка'],
   tip:'<b>Купи:</b> Местный шёлк, вышивку (сюзане), керамику. Торговаться нормально — снижай на 20–30%.'}
];

const ROUTE=[[39.6547,66.9758],[39.6610,66.9745],[39.6680,66.9752],[39.6573,66.9694],[39.7778,64.4142],[39.7760,64.4155],[39.7740,64.4175],[39.7720,64.4197]];
const VIEWS={all:{center:[39.716,65.72],zoom:8},sam:{center:[39.663,66.945],zoom:14},bux:{center:[39.7745,64.421],zoom:15}};

// Init Leaflet
const map=L.map('map',{center:[39.716,65.72],zoom:8,zoomControl:false,attributionControl:true,tap:false});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

// Route
L.polyline(ROUTE,{color:'#ffbe32',weight:2.5,dashArray:'10,10',opacity:.65}).addTo(map);

// City overview bubbles layer (zoom < 11)
const cityLayer=L.layerGroup();
[{label:'Самарканд',lat:39.663,lng:66.945,col:'#e88',count:7,key:'sam'},
 {label:'Бухара',lat:39.7745,lng:64.421,col:'#99d',count:7,key:'bux'}
].forEach(c=>{
  const icon=L.divIcon({
    html:`<div class="city-bubble" style="background:${c.col}25;border-color:${c.col};box-shadow:0 0 24px ${c.col}55;color:${c.col}"><span class="city-count">${c.count}</span><span class="city-label">${c.label}</span></div>`,
    className:'city-icon',
    iconSize:[64,64],
    iconAnchor:[32,32]
  });
  L.marker([c.lat,c.lng],{icon}).on('click',()=>flyTo(c.key)).addTo(cityLayer);
});

// Individual place markers layer (zoom >= 11)
const placeLayer=L.layerGroup();
P.forEach(p=>{
  const fill=p.col+'cc',shadow=p.col+'66';
  const icon=L.divIcon({
    html:`<div class="pin-outer" style="background:${fill};box-shadow:0 0 14px ${shadow}"><span>${p.em}</span></div><div class="pin-tail" style="border-top:8px solid ${fill}"></div>`,
    className:'pin-icon',
    iconSize:[40,48],
    iconAnchor:[20,48],
    tooltipAnchor:[0,4]
  });
  const m=L.marker([p.lat,p.lng],{icon}).addTo(placeLayer);
  m.bindTooltip(p.name,{permanent:true,direction:'bottom',offset:[0,0],className:'place-lbl'});
  m.on('click',()=>openSheet(p));
});

function updateLayers(){
  const z=map.getZoom();
  if(z>=11){cityLayer.remove();placeLayer.addTo(map);}
  else{placeLayer.remove();cityLayer.addTo(map);}
}
map.on('zoomend',updateLayers);
cityLayer.addTo(map); // start at zoom 8

function flyTo(key){
  const v=VIEWS[key];
  map.flyTo(v.center,v.zoom,{duration:.8,easeLinearity:.5});
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('t-'+tab).classList.add('on');
  const isMap=tab==='map';
  document.getElementById('map-wrap').style.display=isMap?'':'none';
  document.getElementById('lv').style.display=isMap?'none':'block';
  if(isMap){
    setTimeout(()=>map.invalidateSize(),50);
  } else {
    renderList(tab);
    flyTo(tab);
  }
}

function renderList(tab){
  const items=P.filter(p=>p.city===tab);
  const city=tab==='sam'?'Самарканд':'Бухара';
  let h=`<div class="lsec"><div class="ltitle">${city} · ${items.length} мест</div>`;
  items.forEach(p=>{
    h+=`<div class="litem" onclick='openSheet(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="licon" style="background:${p.col}22">${p.em}</div>
      <div style="flex:1;min-width:0"><div class="lname">${p.name}</div><div class="ltype">${p.type}</div></div>
      <div class="larr">›</div></div>`;
  });
  document.getElementById('lv').innerHTML=h+'</div>';
}

function openSheet(p){
  const badge=`<span class="sh-badge" style="background:${p.col}22;color:${p.col};border:1px solid ${p.col}55">${p.city==='sam'?'Самарканд':'Бухара'}</span>`;
  const chips=p.facts.map(f=>`<div class="chip">${f}</div>`).join('');
  document.getElementById('shc').innerHTML=`
    <div class="sh-hdr"><span class="sh-em">${p.em}</span>${badge}
      <div class="sh-name">${p.name}</div><div class="sh-type">${p.type}</div></div>
    <div class="sh-body"><div class="sh-desc">${p.desc}</div>
      <div class="chips">${chips}</div>${p.tip?`<div class="tip">${p.tip}</div>`:''}</div>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh').classList.add('on');
}

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
}

let shY=0;
const shEl=document.getElementById('sh');
shEl.addEventListener('touchstart',e=>{shY=e.touches[0].clientY;},{passive:true});
shEl.addEventListener('touchmove',e=>{if(e.touches[0].clientY-shY>60)closeSheet();},{passive:true});

setTimeout(()=>{const h=document.getElementById('hint');h.classList.add('gone');setTimeout(()=>h.style.display='none',1000);},4000);
</script>
</body>
</html>
