   desc:'Жемчужина раннесредневековой архитектуры (~905 г.). Один из старейших исламских мавзолеев. Пережил монгольское нашествие — был засыпан песком.',

const ROUTE=[[39.6547,66.9758],[39.6610,66.9745],[39.6680,66.9752],[39.6573,66.9694],[39.7778,64.4142],[39.7760,64.4155],[39.7740,64.4175],[39.7720,64.4197]];
const VIEWS={all:{lat:39.716,lng:65.72,scale:115},sam:{lat:39.663,lng:66.945,scale:3000},bux:{lat:39.7745,lng:64.421,scale:6500}};
const LAT_R=1.300;

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const wrap=document.getElementById('wrap');
let W,H,dpr=window.devicePixelRatio||1;
let vs={lat:39.716,lng:65.72,scale:115};
let tv={...vs};
let drag=false,lx=0,ly=0,pd0=0,ps0=1,animId=null;

function resize(){
  const r=wrap.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  render();
}

function proj(lat,lng){
  return[W/2+(lng-vs.lng)*vs.scale, H/2-(lat-vs.lat)*vs.scale*LAT_R];
}

function render(){
  ctx.clearRect(0,0,W,H);
  // Background
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a1628');bg.addColorStop(1,'#0d1f3c');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  const step=vs.scale>=2000?0.005:vs.scale>=500?0.02:0.5;
  const w2=W/2/vs.scale,h2=H/2/(vs.scale*LAT_R);
  for(let g=Math.floor((vs.lng-w2-step)/step)*step;g<=vs.lng+w2+step;g+=step){
    const x=W/2+(g-vs.lng)*vs.scale;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let g=Math.floor((vs.lat-h2-step)/step)*step;g<=vs.lat+h2+step;g+=step){
    const y=H/2-(g-vs.lat)*vs.scale*LAT_R;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Route
  ctx.save();ctx.strokeStyle='rgba(255,190,50,.65)';ctx.lineWidth=2;ctx.setLineDash([8,8]);ctx.lineJoin='round';
  ctx.beginPath();
  ROUTE.forEach(([la,ln],i)=>{const[x,y]=proj(la,ln);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();ctx.restore();
  const detail=vs.scale>=800;
  if(!detail){
    [{label:'Самарканд',lat:39.662,lng:66.945,col:'#e77'},{label:'Бухара',lat:39.7745,lng:64.421,col:'#79e'}].forEach(c=>{
      const[x,y]=proj(c.lat,c.lng);
      ctx.save();ctx.shadowColor=c.col;ctx.shadowBlur=22;
      ctx.beginPath();ctx.arc(x,y,28,0,Math.PI*2);
      ctx.fillStyle=c.col+'44';ctx.fill();
      ctx.strokeStyle=c.col;ctx.lineWidth=2;ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#fff';ctx.font='bold 15px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('7',x,y);
      ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='bold 12px -apple-system,sans-serif';ctx.fillText(c.label,x,y+40);
    });
  } else {
    P.forEach(p=>{
      const[x,y]=proj(p.lat,p.lng);
      if(x<-40||x>W+40||y<-40||y>H+40) return;
      const r=20;
      ctx.save();ctx.shadowColor=p.col;ctx.shadowBlur=14;
      ctx.beginPath();ctx.arc(x,y-r,r,0,Math.PI*2);
      ctx.fillStyle=p.col+'cc';ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-7,y-r*.5);ctx.lineTo(x+7,y-r*.5);ctx.lineTo(x,y+5);ctx.closePath();
      ctx.fillStyle=p.col+'cc';ctx.fill();
      ctx.restore();
      ctx.font=r+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.em,x,y-r);
      if(vs.scale>=2500){
        ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
        const tw=ctx.measureText(p.name).width;
        ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(x-tw/2-4,y+8,tw+8,17);
        ctx.fillStyle='#fff';ctx.fillText(p.name,x,y+10);
      }
    });
  }
  // City labels
  [{label:'САМАРКАНД',lat:39.662,lng:66.945},{label:'БУХАРА',lat:39.7745,lng:64.421}].forEach(c=>{
    const[x,y]=proj(c.lat,c.lng);
    if(x<-120||x>W+120) return;
    ctx.font='bold 10px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillStyle='rgba(255,190,50,.45)';ctx.fillText('✈ '+c.label,x,y-(detail?260:56));
  });
}

function flyTo(key){
  const v=VIEWS[key];tv={lat:v.lat,lng:v.lng,scale:v.scale};
  if(!animId)animId=requestAnimationFrame(anim);
}

function anim(){
  let mv=false;
  ['lat','lng','scale'].forEach(k=>{const d=tv[k]-vs[k];if(Math.abs(d)>.00001){vs[k]+=d*.13;mv=true;}else vs[k]=tv[k];});
  render();
  animId=mv?requestAnimationFrame(anim):null;
}

// Touch
function dist2(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY)}

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches;
  if(t.length===1){drag=true;lx=t[0].clientX;ly=t[0].clientY;}
  else if(t.length===2){drag=false;pd0=dist2(t);ps0=vs.scale;}
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches;
  if(t.length===1&&drag){
    vs.lng-=(t[0].clientX-lx)/vs.scale;vs.lat+=(t[0].clientY-ly)/(vs.scale*LAT_R);
    tv={...vs};lx=t[0].clientX;ly=t[0].clientY;render();
  } else if(t.length===2){
    const ns=ps0*(dist2(t)/pd0);vs.scale=Math.max(80,Math.min(22000,ns));tv={...vs};render();
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  if(drag&&e.changedTouches.length===1){
    const dx=e.changedTouches[0].clientX-lx,dy=e.changedTouches[0].clientY-ly;
    if(Math.abs(dx)<8&&Math.abs(dy)<8) tap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  }
  drag=false;
},{passive:true});

cv.addEventListener('mousedown',e=>{drag=true;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('mousemove',e=>{if(!drag)return;vs.lng-=(e.clientX-lx)/vs.scale;vs.lat+=(e.clientY-ly)/(vs.scale*LAT_R);tv={...vs};lx=e.clientX;ly=e.clientY;render();});
cv.addEventListener('mouseup',e=>{if(Math.abs(e.clientX-lx)<5&&Math.abs(e.clientY-ly)<5)tap(e.clientX,e.clientY);drag=false;});
cv.addEventListener('wheel',e=>{e.preventDefault();vs.scale=Math.max(80,Math.min(22000,vs.scale*(e.deltaY>0?.85:1.15)));tv={...vs};render();},{passive:false});

function tap(cx,cy){
  if(vs.scale<800){
    const sp=proj(39.662,66.945),bp=proj(39.7745,64.421);
    if(Math.hypot(cx-sp[0],cy-sp[1])<42){flyTo('sam');return;}
    if(Math.hypot(cx-bp[0],cy-bp[1])<42){flyTo('bux');return;}
    return;
  }
  let best=null,bd=Infinity;
  P.forEach(p=>{const[x,y]=proj(p.lat,p.lng),d=Math.hypot(cx-x,cy-(y-20));if(d<bd){bd=d;best=p;}});
  if(best&&bd<38)openSheet(best);
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('t-'+tab).classList.add('on');
  const isMap=tab==='map';
  cv.style.display=isMap?'block':'none';
  document.getElementById('mbtns').style.display=isMap?'flex':'none';
  document.getElementById('hint').style.display=isMap?'':'none';
  document.getElementById('lv').style.display=isMap?'none':'block';
  if(isMap){render();}else{renderList(tab);flyTo(tab);}
}

function renderList(tab){
  const items=P.filter(p=>p.city===tab);
  const city=tab==='sam'?'Самарканд':'Бухара';
  let h=`<div class="lsec"><div class="ltitle">${city} · ${items.length} мест</div>`;
  items.forEach(p=>{
    h+=`<div class="litem" onclick='openSheet(${JSON.stringify(p).replace(/'/g,"&#39;")})'>
      <div class="licon" style="background:${p.col}22">${p.em}</div>
      <div style="flex:1;min-width:0"><div class="lname">${p.name}</div><div class="ltype">${p.type}</div></div>
      <div class="larr">›</div></div>`;
  });
  document.getElementById('lv').innerHTML=h+'</div>';
}

function openSheet(p){
  const badge=`<span class="sh-badge" style="background:${p.col}22;color:${p.col};border:1px solid ${p.col}55">${p.city==='sam'?'Самарканд':'Бухара'}</span>`;
  const chips=p.facts.map(f=>`<div class="chip">${f}</div>`).join('');
  document.getElementById('shc').innerHTML=`
    <div class="sh-hdr"><span class="sh-em">${p.em}</span>${badge}
      <div class="sh-name">${p.name}</div><div class="sh-type">${p.type}</div></div>
    <div class="sh-body"><div class="sh-desc">${p.desc}</div>
      <div class="chips">${chips}</div>${p.tip?`<div class="tip">${p.tip}</div>`:''}</div>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh').classList.add('on');
}

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
}

let shY=0;
const shEl=document.getElementById('sh');
shEl.addEventListener('touchstart',e=>{shY=e.touches[0].clientY;},{passive:true});
shEl.addEventListener('touchmove',e=>{if(e.touches[0].clientY-shY>60)closeSheet();},{passive:true});

// Hide hint after 4 sec
setTimeout(()=>{const h=document.getElementById('hint');h.classList.add('gone');setTimeout(()=>h.style.display='none',1000);},4000);

window.addEventListener('resize',resize);
resize();
</script>
</body>
</html>
